<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Bisma Shahbaz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: #0e0b08;
      color: #e8ddd0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-gate {
      text-align: center; padding: 60px 40px;
      border: 1px solid rgba(200,169,110,0.15);
      max-width: 400px; width: 90%;
      background: rgba(255,255,255,0.02);
    }
    .admin-logo {
      font-size: 2.5rem; font-style: italic;
      color: #f2e8d9; margin-bottom: 8px;
    }
    .admin-logo span { color: #c8a96e; }
    .admin-sub {
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: #7a6a5a; margin-bottom: 36px;
    }
    .admin-note {
      font-size: 0.82rem; color: #7a6a5a; line-height: 1.6;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="admin-gate">
    <div class="admin-logo"><span>B.</span>Shahbaz</div>
    <div class="admin-sub">Author Dashboard</div>
    <p style="font-size:0.9rem;color:#b8a898;line-height:1.7;margin-bottom:24px;">
      Welcome, Bisma. Log in to manage your books, articles, and site content.
    </p>
    <p class="admin-note">You will be redirected to the dashboard after login.</p>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
