backend:
  name: github
  repo: NvxStrikes/b-shahbaz-writer.github.io
  branch: main
  base_url: https://api.decapcms.org

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: editorial_workflow

collections:

  - name: "books"
    label: "📚 Books"
    folder: "content/books"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Book Title", name: "title", widget: "string" }
      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - { label: "Work in Progress (WIP)", value: "wip" }
          - { label: "Published", value: "published" }
          - { label: "Coming Soon", value: "upcoming" }
          - { label: "Beta Readers Open", value: "beta" }
      - label: "Genre"
        name: "genre"
        widget: "select"
        options:
          - { label: "Gothic Romance", value: "gothic" }
          - { label: "Literary Fiction", value: "literary" }
          - { label: "Cozy Fantasy", value: "fantasy" }
      - { label: "Cover Image", name: "cover", widget: "image", required: false }
      - { label: "Cover Emoji (if no image)", name: "emoji", widget: "string", required: false, default: "📖" }
      - { label: "Short Description", name: "description", widget: "text" }
      - { label: "Full Blurb", name: "body", widget: "markdown", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Beta Reading Open?", name: "beta_open", widget: "boolean", default: false }
      - { label: "Order (lower = first)", name: "order", widget: "number", default: 1 }

  - name: "articles"
    label: "✍️ Articles"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Substack Essay", value: "essay" }
          - { label: "On Writing", value: "writing" }
          - { label: "ARC Review", value: "review" }
          - { label: "Series Review", value: "series-review" }
          - { label: "Reflection", value: "reflection" }
          - { label: "Identity & Voice", value: "identity" }
          - { label: "Book Recommendations", value: "recs" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "External Link (Substack URL)", name: "external_url", widget: "string", required: false }
      - { label: "Featured?", name: "featured", widget: "boolean", default: false }
      - { label: "Full Article Body", name: "body", widget: "markdown", required: false }

  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - label: "🏠 Homepage"
        name: "homepage"
        file: "content/settings/homepage.json"
        fields:
          - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero Tagline", name: "hero_tagline", widget: "string" }
          - { label: "Hero Quote", name: "hero_quote", widget: "text" }
          - { label: "Genre Tags", name: "hero_genres", widget: "list" }
          - { label: "CTA Button 1 Text", name: "cta_primary_text", widget: "string" }
          - { label: "CTA Button 1 Link", name: "cta_primary_link", widget: "string" }
          - { label: "CTA Button 2 Text", name: "cta_secondary_text", widget: "string" }
          - { label: "CTA Button 2 Link", name: "cta_secondary_link", widget: "string" }
          - { label: "Marquee Items", name: "marquee_items", widget: "list" }
          - { label: "Intro Eyebrow", name: "intro_eyebrow", widget: "string" }
          - { label: "Intro Heading", name: "intro_heading", widget: "string" }
          - { label: "Intro Paragraph 1", name: "intro_p1", widget: "text" }
          - { label: "Intro Paragraph 2", name: "intro_p2", widget: "text" }
          - { label: "Big Quote", name: "big_quote", widget: "text" }
          - { label: "Quote Attribution", name: "quote_attr", widget: "string" }
          - { label: "Books Section Eyebrow", name: "books_eyebrow", widget: "string" }
          - { label: "Books Section Heading", name: "books_heading", widget: "string" }
          - { label: "Articles Section Eyebrow", name: "articles_eyebrow", widget: "string" }
          - { label: "Articles Section Heading", name: "articles_heading", widget: "string" }

      - label: "👤 About Page"
        name: "about"
        file: "content/settings/about.json"
        fields:
          - { label: "Author Photo", name: "photo", widget: "image", required: false }
          - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" }
          - { label: "Origin Story Eyebrow", name: "origin_eyebrow", widget: "string" }
          - { label: "Origin Heading", name: "origin_heading", widget: "string" }
          - { label: "Origin Paragraph 1", name: "origin_p1", widget: "text" }
          - { label: "Origin Paragraph 2", name: "origin_p2", widget: "text" }
          - { label: "Highlight Quote", name: "highlight_quote", widget: "string" }
          - { label: "Writing Life Eyebrow", name: "writing_eyebrow", widget: "string" }
          - { label: "Writing Life Heading", name: "writing_heading", widget: "string" }
          - { label: "Writing Life Paragraph 1", name: "writing_p1", widget: "text" }
          - { label: "Writing Life Paragraph 2", name: "writing_p2", widget: "text" }
          - { label: "Reading Eyebrow", name: "reading_eyebrow", widget: "string" }
          - { label: "Reading Heading", name: "reading_heading", widget: "string" }
          - { label: "Reading Intro", name: "reading_intro", widget: "text" }
          - label: "Book Recommendations"
            name: "recs"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Author", name: "author", widget: "string" }
          - { label: "Facts Eyebrow", name: "facts_eyebrow", widget: "string" }
          - { label: "Facts Heading", name: "facts_heading", widget: "string" }
          - label: "Fun Facts"
            name: "facts"
            widget: "list"
            field: { label: "Fact", name: "fact", widget: "string" }
          - label: "Sidebar Links"
            name: "sidebar_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "External?", name: "external", widget: "boolean", default: false }

      - label: "🔗 Social Links & Shop"
        name: "links"
        file: "content/settings/links.json"
        fields:
          - { label: "Instagram URL", name: "instagram", widget: "string" }
          - { label: "Instagram Handle", name: "instagram_handle", widget: "string" }
          - { label: "Linktree URL", name: "linktree", widget: "string" }
          - { label: "Substack URL", name: "substack", widget: "string" }
          - label: "Extra Links"
            name: "extra_links"
            widget: "list"
            required: false
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "desc", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Icon Emoji", name: "icon", widget: "string", default: "🔗" }

      - label: "📧 Newsletter"
        name: "newsletter"
        file: "content/settings/newsletter.json"
        fields:
          - { label: "Mailchimp Embed URL", name: "mailchimp_url", widget: "string", required: false }
          - { label: "Newsletter Heading", name: "heading", widget: "string" }
          - { label: "Newsletter Subtext", name: "subtext", widget: "string" }
